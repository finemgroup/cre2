<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Evidence Conflict Resolver</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#1b1b1d",
                      "on-tertiary-container": "#98805d",
                      "on-primary-fixed-variant": "#3f465c",
                      "surface-container-high": "#eae7e9",
                      "primary": "#000000",
                      "on-tertiary": "#ffffff",
                      "tertiary": "#000000",
                      "error-container": "#ffdad6",
                      "error": "#ba1a1a",
                      "surface": "#fcf8fa",
                      "on-surface-variant": "#45464d",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#f3f0f2",
                      "secondary-container": "#316bf3",
                      "secondary": "#0051d5",
                      "secondary-fixed": "#dbe1ff",
                      "outline": "#76777d",
                      "background": "#fcf8fa",
                      "surface-container": "#f0edef",
                      "primary-container": "#131b2e",
                      "on-secondary-fixed": "#00174b",
                      "on-secondary-container": "#fefcff",
                      "on-tertiary-fixed": "#271901",
                      "surface-tint": "#565e74",
                      "tertiary-fixed": "#fcdeb5",
                      "surface-variant": "#e4e2e4",
                      "on-error-container": "#93000a",
                      "on-error": "#ffffff",
                      "inverse-surface": "#303032",
                      "on-background": "#1b1b1d",
                      "on-primary-fixed": "#131b2e",
                      "primary-fixed": "#dae2fd",
                      "primary-fixed-dim": "#bec6e0",
                      "outline-variant": "#c6c6cd",
                      "secondary-fixed-dim": "#b4c5ff",
                      "on-secondary-fixed-variant": "#003ea8",
                      "on-primary": "#ffffff",
                      "surface-container-low": "#f6f3f5",
                      "surface-dim": "#dcd9db",
                      "on-primary-container": "#7c839b",
                      "surface-bright": "#fcf8fa",
                      "tertiary-container": "#271901",
                      "inverse-primary": "#bec6e0",
                      "on-tertiary-fixed-variant": "#574425",
                      "surface-container-highest": "#e4e2e4",
                      "tertiary-fixed-dim": "#dec29a",
                      "on-secondary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "table-cell-padding": "8px 12px",
                      "margin-desktop": "24px",
                      "base": "4px",
                      "rail-width": "48px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "label-caps": ["Inter"],
                      "source-ref": ["JetBrains Mono"],
                      "body-sm": ["Inter"],
                      "advisory-italic": ["Inter"],
                      "headline-sm": ["Inter"],
                      "headline-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "source-ref": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                      "body-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "400"}],
                      "advisory-italic": ["13px", {"lineHeight": "18px", "fontWeight": "400", "fontStyle": "italic"}],
                      "headline-sm": ["16px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "display-lg": ["30px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-sans antialiased">
<!-- Mock Background for Context -->
<div class="fixed inset-0 bg-surface-variant/50 pointer-events-none"></div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/40 flex items-center justify-center p-4 sm:p-6 z-50">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[800px] rounded-lg shadow-xl border border-outline-variant flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-6 py-4 border-b border-outline-variant bg-surface flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-surface">Unit Count Discrepancy</h2>
</div>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface p-1 rounded hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Body -->
<div class="flex-1 overflow-y-auto">
<!-- Evidence Cards Section -->
<div class="p-6 bg-surface border-b border-outline-variant">
<h3 class="text-label-caps font-label-caps text-on-surface-variant mb-4 uppercase tracking-wider">Select Authorized Source Value</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="evidence-cards-container">
<!-- Card 1: OM -->
<label class="block relative cursor-pointer group">
<input class="peer sr-only" name="source_selection" type="radio" value="om"/>
<div class="h-full border border-outline-variant rounded bg-surface-container-lowest p-4 transition-all duration-200 ease-in-out peer-checked:border-secondary peer-checked:bg-secondary-fixed/30 peer-checked:shadow-sm hover:border-primary-fixed-dim">
<div class="flex justify-between items-start mb-3">
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">Offering Mem.</span>
<span class="bg-surface-container text-on-surface-variant text-source-ref font-source-ref px-1.5 py-0.5 rounded flex items-center gap-1 border border-outline-variant/50">
<span class="material-symbols-outlined text-[12px]">link</span>pg. 14
                                    </span>
</div>
<div class="text-display-lg font-display-lg text-primary mb-3">196</div>
<div class="flex justify-between items-end border-t border-outline-variant/30 pt-3">
<div class="text-body-sm font-body-sm text-on-surface-variant flex flex-col">
<span>Extracted</span>
<span class="text-on-surface">10/24/23</span>
</div>
<div class="flex items-center gap-1 text-on-tertiary-container bg-tertiary-fixed/30 px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wide uppercase">
<span class="material-symbols-outlined text-[14px]">verified</span>High
                                    </div>
</div>
<!-- Selected Indicator -->
<div class="absolute top-3 right-3 text-secondary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Card 2: Rent Roll -->
<label class="block relative cursor-pointer group">
<input class="peer sr-only" name="source_selection" type="radio" value="rent_roll"/>
<div class="h-full border border-outline-variant rounded bg-surface-container-lowest p-4 transition-all duration-200 ease-in-out peer-checked:border-secondary peer-checked:bg-secondary-fixed/30 peer-checked:shadow-sm hover:border-primary-fixed-dim">
<div class="flex justify-between items-start mb-3">
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">Rent Roll</span>
<span class="bg-surface-container text-on-surface-variant text-source-ref font-source-ref px-1.5 py-0.5 rounded flex items-center gap-1 border border-outline-variant/50">
<span class="material-symbols-outlined text-[12px]">link</span>pg. 1
                                    </span>
</div>
<div class="text-display-lg font-display-lg text-primary mb-3">194</div>
<div class="flex justify-between items-end border-t border-outline-variant/30 pt-3">
<div class="text-body-sm font-body-sm text-on-surface-variant flex flex-col">
<span>Extracted</span>
<span class="text-on-surface">11/02/23</span>
</div>
<div class="flex items-center gap-1 text-on-surface-variant bg-surface-variant px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wide uppercase">
<span class="material-symbols-outlined text-[14px]">remove</span>Med
                                    </div>
</div>
<!-- Selected Indicator -->
<div class="absolute top-3 right-3 text-secondary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Card 3: Analyst Override -->
<label class="block relative cursor-pointer group">
<input class="peer sr-only" name="source_selection" type="radio" value="analyst"/>
<div class="h-full border border-outline-variant rounded bg-surface-container-lowest p-4 transition-all duration-200 ease-in-out peer-checked:border-secondary peer-checked:bg-secondary-fixed/30 peer-checked:shadow-sm hover:border-primary-fixed-dim">
<div class="flex justify-between items-start mb-3">
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">Analyst Override</span>
<span class="bg-surface-container text-on-surface-variant text-source-ref font-source-ref px-1.5 py-0.5 rounded flex items-center gap-1 border border-outline-variant/50">
<span class="material-symbols-outlined text-[12px]">person</span>J. Doe
                                    </span>
</div>
<div class="text-display-lg font-display-lg text-primary mb-3">195</div>
<div class="flex justify-between items-end border-t border-outline-variant/30 pt-3">
<div class="text-body-sm font-body-sm text-on-surface-variant flex flex-col">
<span>Entered</span>
<span class="text-on-surface">11/05/23</span>
</div>
<div class="flex items-center gap-1 text-on-tertiary-container bg-tertiary-fixed/30 px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wide uppercase">
<span class="material-symbols-outlined text-[14px]">verified</span>Manual
                                    </div>
</div>
<!-- Selected Indicator -->
<div class="absolute top-3 right-3 text-secondary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
</div>
</div>
<!-- Action Area -->
<div class="p-6 flex flex-col gap-5 bg-surface-container-lowest">
<!-- Hold Option -->
<label class="flex items-center gap-3 cursor-pointer p-3 rounded border border-transparent hover:bg-surface-container transition-colors w-fit">
<input class="w-4 h-4 text-secondary bg-surface border-outline-variant focus:ring-secondary focus:ring-2" name="source_selection" type="radio" value="hold"/>
<span class="text-body-md font-body-md text-on-surface font-medium">Hold Unresolved (Escalate to Senior Reviewer)</span>
</label>
<!-- Reason Textarea -->
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-surface-variant uppercase flex items-center gap-1" for="resolution_reason">
                            Resolution Rationale <span aria-hidden="true" class="text-error">*</span>
</label>
<textarea class="w-full border border-outline-variant rounded bg-surface p-3 text-body-md font-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-shadow resize-y min-h-[80px]" id="resolution_reason" placeholder="Provide justification for selecting the overridden value or holding the discrepancy..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-4 border-t border-outline-variant bg-surface flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
<div class="flex items-start gap-2 text-advisory-italic font-advisory-italic text-on-surface-variant max-w-[400px]">
<span class="material-symbols-outlined text-[18px] shrink-0 mt-0.5">info</span>
<p>Resolution is a mock reviewer action and does not promote truth outside this prototype.</p>
</div>
<div class="flex gap-3 w-full sm:w-auto justify-end shrink-0">
<button class="px-5 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-headline-sm text-headline-sm hover:bg-surface-container transition-colors">
                        Cancel
                    </button>
<button class="px-5 py-2 bg-primary text-on-primary rounded font-headline-sm text-headline-sm disabled:bg-surface-variant disabled:text-outline disabled:cursor-not-allowed hover:bg-on-primary-fixed-variant transition-colors shadow-sm" disabled="" id="confirm_btn">
                        Confirm Decision
                    </button>
</div>
</div>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const radioButtons = document.querySelectorAll('input[name="source_selection"]');
            const reasonTextarea = document.getElementById('resolution_reason');
            const confirmBtn = document.getElementById('confirm_btn');

            function checkFormValidity() {
                let isRadioSelected = false;
                radioButtons.forEach(radio => {
                    if (radio.checked) isRadioSelected = true;
                });

                const isReasonProvided = reasonTextarea.value.trim().length > 0;

                if (isRadioSelected && isReasonProvided) {
                    confirmBtn.removeAttribute('disabled');
                } else {
                    confirmBtn.setAttribute('disabled', 'true');
                }
            }

            // Listeners
            radioButtons.forEach(radio => {
                radio.addEventListener('change', checkFormValidity);
            });
            reasonTextarea.addEventListener('input', checkFormValidity);
        });
    </script>
</body></html>
